<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題集管理アプリ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>問題集管理</h1>

<!-- 科目追加 -->
<h2>科目追加</h2>
<input id="subjectInput" placeholder="科目名">
<button onclick="addSubject()">追加</button>

<h2>科目一覧</h2>
<div id="subjectList"></div>

<h2 id="currentSubject">現在選択中：なし</h2>

<!-- 問題集追加 -->
<div id="workbookSection" class="hidden">
  <h2>問題集追加</h2>
  <input id="workbookInput" placeholder="問題集名">
  <input id="countInput" type="number" placeholder="問題数">
  <button onclick="addWorkbook()">追加</button>

  <h2>問題集一覧</h2>
  <div id="workbookList"></div>
</div>

<!-- 問題画面 -->
<div id="questionSection" class="hidden">
  <h2 id="workbookTitle"></h2>
  <p id="rate">達成率：0%</p>
  <p id="progress">取り組み率：0%</p>
  <div id="questions" class="grid"></div>
  <button onclick="backToWorkbooks()">戻る</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("studyData")) || {};
let selectedSubject = null;
let selectedWorkbook = null;
let openIndex = null; // 今○△×ボタンを表示している問題番号

function saveData() {
  localStorage.setItem("studyData", JSON.stringify(data));
}

/* ========= 科目 ========= */

function addSubject() {
  const name = subjectInput.value.trim();
  if (!name) return;
  if (!data[name]) {
    data[name] = {};
    saveData();
    renderSubjects();
  }
  subjectInput.value = "";
}

function selectSubject(name) {
  selectedSubject = name;
  currentSubject.textContent = "現在選択中：" + name;
  workbookSection.classList.remove("hidden");
  renderSubjects();
  renderWorkbooks();
}

function renderSubjects() {
  subjectList.innerHTML = "";
  for (let subject in data) {

    const wrapper = document.createElement("div");

    const btn = document.createElement("button");
    btn.textContent = subject;
    if (subject === selectedSubject) btn.classList.add("selected");
    btn.onclick = () => selectSubject(subject);

    const del = document.createElement("button");
    del.textContent = "削除";
    del.onclick = () => {
      if (!confirm("本当に削除しますか？")) return;
      delete data[subject];
      if (selectedSubject === subject) {
        selectedSubject = null;
        workbookSection.classList.add("hidden");
        currentSubject.textContent = "現在選択中：なし";
      }
      saveData();
      renderSubjects();
    };

    wrapper.appendChild(btn);
    wrapper.appendChild(del);
    subjectList.appendChild(wrapper);
  }
}

/* ========= 問題集 ========= */

function addWorkbook() {
  if (!selectedSubject) return;

  const name = workbookInput.value.trim();
  const count = parseInt(countInput.value);

  if (!name || !count) return;

  if (!data[selectedSubject][name]) {
    data[selectedSubject][name] = {
      count: count,
      scores: new Array(count).fill(0).map(()=>[])
    };
    saveData();
    renderWorkbooks();
  }

  workbookInput.value = "";
  countInput.value = "";
}

function renderWorkbooks() {
  workbookList.innerHTML = "";

  for (let wb in data[selectedSubject]) {

    const wrapper = document.createElement("div");

    const btn = document.createElement("button");
    btn.textContent = wb;
    btn.onclick = () => openWorkbook(wb);

    const del = document.createElement("button");
    del.textContent = "削除";
    del.onclick = () => {
      if (!confirm("本当に削除しますか？")) return;
      delete data[selectedSubject][wb];
      saveData();
      renderWorkbooks();
    };

    wrapper.appendChild(btn);
    wrapper.appendChild(del);
    workbookList.appendChild(wrapper);
  }
}

/* ========= 問題画面 ========= */

function openWorkbook(name) {
  selectedWorkbook = name;
  openIndex = null;
  workbookTitle.textContent = name;

  workbookSection.classList.add("hidden");
  questionSection.classList.remove("hidden");

  renderQuestions();
}

function renderQuestions() {
  questions.innerHTML = "";

  const wb = data[selectedSubject][selectedWorkbook];
  const scores = wb.scores;

  for (let i = 0; i < wb.count; i++) {

    const history = scores[i];
    const latest = history[history.length - 1];

    const cell = document.createElement("div");
    cell.className = "cell";

    // 色（最新結果）→ ヒートマップ的に一目で状況がわかる
    if (latest === 1) cell.classList.add("correct");
    if (latest === 0.5) cell.classList.add("half");
    if (latest === 0) cell.classList.add("wrong");

    if (openIndex === i) {
      // クリックされた問題だけ○△×ボタンを表示する
      cell.classList.add("open");

      const label = document.createElement("div");
      label.textContent = (i + 1) + "（挑戦回数: " + history.length + "）";
      cell.appendChild(label);

      const buttons = document.createElement("div");
      buttons.className = "buttons";

      ["○","△","×"].forEach(symbol => {
        const btn = document.createElement("button");
        btn.textContent = symbol;

        btn.onclick = (e) => {
          e.stopPropagation();
          let value;
          if (symbol === "○") value = 1;
          if (symbol === "△") value = 0.5;
          if (symbol === "×") value = 0;

          scores[i].push(value); // 履歴追加
          saveData();
          openIndex = null; // 入力したら閉じる
          renderQuestions();
        };

        buttons.appendChild(btn);
      });

      cell.appendChild(buttons);

      cell.onclick = () => {
        openIndex = null;
        renderQuestions();
      };

    } else {
      // 普段は番号と挑戦回数だけのシンプルな表示
      cell.textContent = i + 1;

      const countSpan = document.createElement("span");
      countSpan.className = "count";
      countSpan.textContent = history.length + "回";
      cell.appendChild(countSpan);

      cell.onclick = () => {
        openIndex = i;
        renderQuestions();
      };
    }

    questions.appendChild(cell);
  }

  updateRate();
}

function updateRate() {
  const wb = data[selectedSubject][selectedWorkbook];
  let score = 0;
  let solved = 0;

  for (let history of wb.scores) {
    if (history.length > 0) {
      solved++;
      score += history[history.length - 1]; // 最新のみ
    }
  }

  const rate = (score / wb.count) * 100;
  const progress = (solved / wb.count) * 100;

  document.getElementById("rate").textContent =
    "達成率：" + rate.toFixed(1) + "%";
  document.getElementById("progress").textContent =
    "取り組み率：" + progress.toFixed(1) + "%";
}

function backToWorkbooks() {
  questionSection.classList.add("hidden");
  workbookSection.classList.remove("hidden");
}

/* ========= 初期表示 ========= */

renderSubjects();
</script>

</body>
</html>
